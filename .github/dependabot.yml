version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 10
    labels: [dependencies, frontend]
    groups:
      minor-patch:
        update-types: [minor, patch]
  - package-ecosystem: cargo
    directory: /src-tauri/
    schedule: { interval: weekly, day: monday }
    open-pull-requests-limit: 10
    labels: [dependencies, backend]
