name: Bug 报告
description: 报告一个 bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes: { label: 问题描述, description: 清晰描述 bug 现象 }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: 复现步骤, description: 详细描述复现步骤 }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: 期望行为 }
    validations: { required: true }
  - type: textarea
    id: environment
    attributes: { label: 环境信息, placeholder: "OS: macOS 14 / App: v0.2.2" }
    validations: { required: true }
